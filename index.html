<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kingdom Control Solutions</title>
  <link rel="icon" href="/favicon.png" type="image/x-icon">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --blue: #0ea5e9;
      --blue-dark: #0284c7;
      --blue-glow: rgba(14, 165, 233, 0.25);
      --dark: #090c10;
      --dark-2: #0f1318;
      --steel: #8b949e;
      --steel-light: #b0bec5;
      --white: #f0f4f8;
    }

    html, body {
      height: 100%;
      overflow: hidden;
      font-family: 'Barlow', sans-serif;
      background: var(--dark);
      color: var(--white);
    }

    /* ── NAV ─────────────────────────────────────────── */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 200;
      padding: 1.4rem 2.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(9, 12, 16, 0.72);
      backdrop-filter: blur(14px);
      border-bottom: 1px solid rgba(14, 165, 233, 0.12);
    }

    .nav-logo img {
      height: 48px;
      width: auto;
    }

    /* ── SPLIT WRAPPER ───────────────────────────────── */
    .split {
      display: flex;
      width: 100vw;
      height: 100vh;
      position: relative;
    }

    /* ── EACH PANEL ──────────────────────────────────── */
    .panel {
      position: relative;
      flex: 1;
      overflow: hidden;
      cursor: pointer;
      text-decoration: none;
      display: block;
      transition: flex 0.35s cubic-bezier(0.77, 0, 0.175, 1);
    }

    .split:has(.panel:hover) .panel:not(:hover) {
      flex: 0.72;
    }

    .split:has(.panel:hover) .panel:hover {
      flex: 1.28;
    }

    /* Background image */
    .panel-bg {
      position: absolute;
      inset: 0;
      background-size: cover;
      background-position: center;
      transition: transform 0.35s cubic-bezier(0.25, 0.46, 0.45, 0.94),
                  filter 0.35s ease;
      filter: brightness(0.38) saturate(0.7);
      will-change: transform;
    }

    .panel:hover .panel-bg {
      transform: scale(1.06);
      filter: brightness(0.48) saturate(0.85);
    }

    /* Building Automation image — exterior HVAC/mechanical plant */
    .panel-building .panel-bg {
      background-image: url("/images/BAS hero bg.jpg");
    }

    /* Industrial Automation image — manufacturing / robotics floor */
    .panel-industrial .panel-bg {
      background-image: url("/images/industrial hero bg.jpg");
    }

    /* Dark gradient overlay on top of image */
    .panel-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to bottom,
        rgba(9,12,16,0.25) 0%,
        rgba(9,12,16,0.05) 40%,
        rgba(9,12,16,0.55) 100%
      );
      transition: background 0.25s ease;
    }

    .panel:hover .panel-overlay {
      background: linear-gradient(
        to bottom,
        rgba(9,12,16,0.15) 0%,
        rgba(9,12,16,0.0) 40%,
        rgba(9,12,16,0.45) 100%
      );
    }

    /* ── DECORATIVE FRAME LINES ──────────────────────── */
    .panel-frame {
      position: absolute;
      inset: 28px;
      pointer-events: none;
      transition: inset 0.25s cubic-bezier(0.25, 0.46, 0.45, 0.94),
                  opacity 0.25s ease;
      opacity: 0.45;
    }

    .panel:hover .panel-frame {
      inset: 22px;
      opacity: 0.75;
    }

    /* Four corner brackets drawn with SVG */
    .panel-frame svg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }

    /* ── CONTENT ─────────────────────────────────────── */
    .panel-content {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
    }

    .panel-label {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--blue);
      margin-bottom: 1.1rem;
      opacity: 0;
      transform: translateY(6px);
      transition: opacity 0.2s 0.02s ease, transform 0.2s 0.02s ease;
    }

    .panel:hover .panel-label {
      opacity: 1;
      transform: translateY(0);
    }

    .panel-title {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: clamp(2.2rem, 4.5vw, 3.8rem);
      font-weight: 800;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--white);
      line-height: 1.0;
      text-shadow: 0 2px 32px rgba(0,0,0,0.8);
      transition: transform 0.25s cubic-bezier(0.25, 0.46, 0.45, 0.94),
                  letter-spacing 0.2s ease;
    }

    .panel:hover .panel-title {
      transform: translateY(-4px) scale(1.03);
      letter-spacing: 0.06em;
    }

    .panel-divider {
      width: 40px;
      height: 2px;
      background: var(--blue);
      margin: 1.4rem auto;
      transition: width 0.2s ease, opacity 0.2s ease;
      opacity: 0.7;
    }

    .panel:hover .panel-divider {
      width: 70px;
      opacity: 1;
    }

    .panel-sub {
      font-family: 'Barlow', sans-serif;
      font-size: clamp(0.82rem, 1.2vw, 0.95rem);
      font-weight: 300;
      color: var(--steel-light);
      letter-spacing: 0.04em;
      max-width: 280px;
      line-height: 1.55;
      opacity: 0;
      transform: translateY(8px);
      transition: opacity 0.2s 0.04s ease, transform 0.2s 0.04s ease;
    }

    .panel:hover .panel-sub {
      opacity: 1;
      transform: translateY(0);
    }

    /* ── ENTER ARROW ─────────────────────────────────── */
    .panel-enter {
      margin-top: 2.2rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.55rem;
      opacity: 0;
      transform: translateY(14px);
      transition: opacity 0.2s 0.06s ease, transform 0.2s 0.06s ease;
    }

    .panel:hover .panel-enter {
      opacity: 1;
      transform: translateY(0);
    }

    .enter-label {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--blue);
    }

    .enter-arrow {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 40px;
      height: 40px;
      border: 1.5px solid var(--blue);
      border-radius: 50%;
      animation: bounceDown 1.6s ease-in-out infinite;
    }

    .enter-arrow svg {
      color: var(--blue);
    }

    @keyframes bounceDown {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(5px); }
    }

    /* ── PAGE TRANSITION OVERLAY ─────────────────────── */
    .page-transition {
      position: fixed;
      inset: 0;
      background: var(--dark);
      z-index: 9999;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.5s ease;
    }

    .page-transition.active {
      opacity: 1;
      pointer-events: all;
    }

    /* ── BOTTOM HINT ─────────────────────────────────── */
    .bottom-hint {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%);
      z-index: 100;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--steel);
      pointer-events: none;
      transition: opacity 0.4s ease;
    }

    .split:has(.panel:hover) .bottom-hint {
      opacity: 0;
    }

    /* ── RESPONSIVE / MOBILE ─────────────────────────── */
    @media (max-width: 700px) {
      html, body { overflow: hidden; height: 100%; }

      nav {
        padding: 0.75rem 1.25rem;
        justify-content: center;
      }

      .split {
        flex-direction: column;
        height: 100vh;
      }

      .panel {
        flex: 1;
        transition: flex 0.45s cubic-bezier(0.77, 0, 0.175, 1);
      }

      .split.touch-active .panel.touch-focus {
        flex: 1.7;
      }
      .split.touch-active .panel:not(.touch-focus) {
        flex: 0.3;
      }

      .panel.touch-focus .panel-bg {
        transform: scale(1.06);
        filter: brightness(0.48) saturate(0.85);
      }
      .panel.touch-focus .panel-overlay {
        background: linear-gradient(
          to bottom,
          rgba(9,12,16,0.15) 0%,
          rgba(9,12,16,0.0) 40%,
          rgba(9,12,16,0.45) 100%
        );
      }
      .panel.touch-focus .panel-frame {
        inset: 14px;
        opacity: 0.75;
      }
      .panel.touch-focus .panel-title {
        transform: translateY(-4px) scale(1.03);
        letter-spacing: 0.06em;
      }
      .panel.touch-focus .panel-label,
      .panel.touch-focus .panel-sub,
      .panel.touch-focus .panel-enter {
        opacity: 1;
        transform: translateY(0);
      }
      .panel.touch-focus .panel-divider {
        width: 70px;
        opacity: 1;
      }

      .panel-title { font-size: clamp(1.6rem, 7vw, 2.4rem); }
      .panel-sub { font-size: 0.88rem; max-width: 240px; }

      .bottom-hint {
        font-size: 0.65rem;
        bottom: 1.2rem;
        white-space: nowrap;
      }
      .split.touch-active .bottom-hint { opacity: 0; }

      .split.touch-active .panel:not(.touch-focus) .panel-title {
        font-size: 1rem;
        letter-spacing: 0.12em;
      }
    }
  </style>
</head>
<body>

  <!-- NAV -->
  <nav>
    <a class="nav-logo" href="/">
      <img src="/images/logo-small.svg" alt="Kingdom Control Solutions" onerror="this.style.display='none'">
    </a>

  </nav>

  <!-- SPLIT SCREEN -->
  <div class="split" id="split">

    <!-- BUILDING AUTOMATION -->
    <a class="panel panel-building" href="/building" data-panel="building">

      <div class="panel-bg"></div>
      <div class="panel-overlay"></div>

      <!-- Corner frame decoration -->
      <div class="panel-frame">
        <svg viewBox="0 0 100 100" preserveAspectRatio="none" fill="none" xmlns="http://www.w3.org/2000/svg">
          <polyline points="0,14 0,0 14,0" stroke="#0ea5e9" stroke-width="0.6" vector-effect="non-scaling-stroke"/>
          <polyline points="86,0 100,0 100,14" stroke="#0ea5e9" stroke-width="0.6" vector-effect="non-scaling-stroke"/>
          <polyline points="0,86 0,100 14,100" stroke="#0ea5e9" stroke-width="0.6" vector-effect="non-scaling-stroke"/>
          <polyline points="86,100 100,100 100,86" stroke="#0ea5e9" stroke-width="0.6" vector-effect="non-scaling-stroke"/>
          <rect x="5" y="5" width="90" height="90" stroke="#0ea5e9" stroke-width="0.25" stroke-dasharray="3 5" opacity="0.4" vector-effect="non-scaling-stroke"/>
        </svg>
      </div>

      <div class="panel-content">
        <div class="panel-label">Kingdom Control Solutions</div>
        <div class="panel-title">Building<br>Automation</div>
        <div class="panel-divider"></div>
        <div class="panel-sub">HVAC controls, BAS integration, energy management, and intelligent building systems.</div>
        <div class="panel-enter">
          <span class="enter-label">Enter</span>
          <div class="enter-arrow">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="12" y1="5" x2="12" y2="19"/>
              <polyline points="19 12 12 19 5 12"/>
            </svg>
          </div>
        </div>
      </div>

    </a>

    <!-- INDUSTRIAL AUTOMATION -->
    <a class="panel panel-industrial" href="/industrial" data-panel="industrial">

      <div class="panel-bg"></div>
      <div class="panel-overlay"></div>

      <div class="panel-frame">
        <svg viewBox="0 0 100 100" preserveAspectRatio="none" fill="none" xmlns="http://www.w3.org/2000/svg">
          <polyline points="0,14 0,0 14,0" stroke="#0ea5e9" stroke-width="0.6" vector-effect="non-scaling-stroke"/>
          <polyline points="86,0 100,0 100,14" stroke="#0ea5e9" stroke-width="0.6" vector-effect="non-scaling-stroke"/>
          <polyline points="0,86 0,100 14,100" stroke="#0ea5e9" stroke-width="0.6" vector-effect="non-scaling-stroke"/>
          <polyline points="86,100 100,100 100,86" stroke="#0ea5e9" stroke-width="0.6" vector-effect="non-scaling-stroke"/>
          <rect x="5" y="5" width="90" height="90" stroke="#0ea5e9" stroke-width="0.25" stroke-dasharray="3 5" opacity="0.4" vector-effect="non-scaling-stroke"/>
        </svg>
      </div>

      <div class="panel-content">
        <div class="panel-label">Kingdom Control Solutions</div>
        <div class="panel-title">Industrial<br>Automation</div>
        <div class="panel-divider"></div>
        <div class="panel-sub">PLC programming, robotics integration, SCADA systems, and high-speed manufacturing controls.</div>
        <div class="panel-enter">
          <span class="enter-label">Enter</span>
          <div class="enter-arrow">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="12" y1="5" x2="12" y2="19"/>
              <polyline points="19 12 12 19 5 12"/>
            </svg>
          </div>
        </div>
      </div>

    </a>

  </div><!-- /split -->

  <!-- PAGE TRANSITION OVERLAY -->
  <div class="page-transition" id="pageTransition"></div>

  <script>
    const isTouchDevice = () => window.matchMedia('(hover: none) and (pointer: coarse)').matches;
    const split = document.getElementById('split');
    const panels = document.querySelectorAll('.panel');
    const hint = document.getElementById('bottomHint');

    // ── TOUCH LOGIC ──────────────────────────────────────
    if (isTouchDevice()) {
      // Update hint text for touch
      hint.textContent = 'Tap a sector to explore  ↕';

      let activePanelEl = null;

      panels.forEach(panel => {
        panel.addEventListener('click', function(e) {
          e.preventDefault();
          const dest = this.getAttribute('href');

          // If this panel is already active → navigate
          if (this.classList.contains('touch-focus')) {
            const overlay = document.getElementById('pageTransition');
            overlay.classList.add('active');
            setTimeout(() => { window.location.href = dest; }, 520);
            return;
          }

          // Activate this panel, deactivate the other
          panels.forEach(p => p.classList.remove('touch-focus'));
          this.classList.add('touch-focus');
          split.classList.add('touch-active');
          activePanelEl = this;
        });
      });
    }

    // ── DESKTOP CLICK LOGIC ───────────────────────────────
    if (!isTouchDevice()) {
      panels.forEach(panel => {
        panel.addEventListener('click', function(e) {
          e.preventDefault();
          const dest = this.getAttribute('href');
          const overlay = document.getElementById('pageTransition');
          overlay.classList.add('active');
          setTimeout(() => { window.location.href = dest; }, 520);
        });
      });
    }

    // ── BACK BUTTON ───────────────────────────────────────
    window.addEventListener('pageshow', () => {
      document.getElementById('pageTransition').classList.remove('active');
    });
  </script>
</body>
</html>
